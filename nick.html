<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Houston 3-Day Hitlist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hide scrollbar for the horizontal filter menu to keep it clean */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased pb-10">

    <!-- Header -->
    <header class="bg-white px-5 pt-12 pb-4 shadow-sm sticky top-0 z-20">
        <h1 class="text-2xl font-black tracking-tight text-gray-900 mb-1">Houston Hitlist</h1>
        <p class="text-sm text-gray-500 font-medium">Curated 2-Day Guide for Nick</p>
        
        <!-- Filter Chips -->
        <div class="flex overflow-x-auto hide-scrollbar mt-4 pb-2 -mx-5 px-5 space-x-2" id="filter-container">
            <!-- Buttons injected via JS -->
        </div>
    </header>

    <!-- Venue List -->
    <main class="p-5" id="venue-list">
        <!-- Cards injected via JS -->
    </main>

    <script>
        const venues = [
            {
                name: "Notsuoh",
                category: "Bars",
                icon: "🍸",
                color: "bg-purple-100 text-purple-800",
                gist: "A surrealist art installation disguised as a downtown dive bar. Multi-story, filled with weird taxidermy, and features a top-floor indie music dome.",
                link: "http://notsuoh.com/"
            },
            {
                name: "Poison Girl",
                category: "Bars",
                icon: "🍸",
                color: "bg-purple-100 text-purple-800",
                gist: "Montrose dive bar masking a world-class, encyclopedia-level whiskey program. Features analog pinball and a massive patio with a giant Kool-Aid Man.",
                link: "http://www.poisongirlbar.com/"
            },
            {
                name: "Lola's Depot",
                category: "Bars",
                icon: "🍸",
                color: "bg-purple-100 text-purple-800",
                gist: "Houston's ultimate, uncompromising dive bar in a windowless purple building. Cheap, potent drinks in a cavernous space covered entirely in decades of stickers and graffiti.",
                link: "https://lolas-depot.weeblyte.com/"
            },
            {
                name: "Little Dipper Bar",
                category: "Bars",
                icon: "🍸",
                color: "bg-purple-100 text-purple-800",
                gist: "Downtown sibling to Poison Girl. Boasts 13 themed pinball machines, a staff-curated physical library, and a patio that extends right into Main Street.",
                link: "https://littledipperhtx.com/"
            },
            {
                name: "La Carafe",
                category: "Bars",
                icon: "🍸",
                color: "bg-purple-100 text-purple-800",
                gist: "Houston's oldest commercial building. Intimate, candle-lit, cash-only, and strictly beer/wine. Rumored to be haunted; a profound historical time capsule.",
                link: "https://downtownhouston.org/go/la-carafe"
            },
            {
                name: "Pinkerton's Barbecue",
                category: "BBQ",
                icon: "🍖",
                color: "bg-red-100 text-red-800",
                gist: "Elite, award-winning Texas BBQ without the crippling 4-hour rural wait times. Perfect brisket and urban convenience for a packed 3-day itinerary.",
                link: "https://www.visithoustontexas.com/listings/pinkertons-barbecue/"
            },
            {
                name: "Truth BBQ",
                category: "BBQ",
                icon: "🍖",
                color: "bg-red-100 text-red-800",
                gist: "Michelin Bib Gourmand vanguard of Texas BBQ. Legendary 18-hour smoked brisket paired with progressive, scratch-made sides and multi-layer cakes.",
                link: "https://truthbbq.com/"
            },
            {
                name: "El Tiempo Cantina",
                category: "Tex-Mex",
                icon: "🌮",
                color: "bg-green-100 text-green-800",
                gist: "The absolute gold standard for midscale, high-energy Houston Tex-Mex. Massive sizzling fajita platters and notoriously potent margaritas.",
                link: "https://www.eltiempocantina.com/"
            },
            {
                name: "The Original Ninfa's",
                category: "Tex-Mex",
                icon: "🌮",
                color: "bg-green-100 text-green-800",
                gist: "The historic East End birthplace of the global fajita craze. Continues to innovate today with legendary brunches and progressive cocktails.",
                link: "https://ninfas.com/"
            },
            {
                name: "Lankford's Grocery & Market",
                category: "Historic Lunch",
                icon: "🥪",
                color: "bg-yellow-100 text-yellow-800",
                gist: "1930s neighborhood grocery turned Midtown restaurant legend. Grab the classic bacon cheeseburger in this perfectly preserved, unpretentious spot.",
                link: "https://midtown.lankfordsburgers.com/"
            },
            {
                name: "Treebeards",
                category: "Historic Lunch",
                icon: "🥪",
                color: "bg-yellow-100 text-yellow-800",
                gist: "Downtown staple since 1978 serving Southern/Cajun comfort food. Unbelievable gumbo, but you must order the dense, addictive Butter Cake.",
                link: "https://treebeards.com/"
            },
            {
                name: "Niko Niko's",
                category: "Historic Lunch",
                icon: "🥪",
                color: "bg-yellow-100 text-yellow-800",
                gist: "Bustling 1970s Montrose institution slinging massive, high-value portions of authentic Greek gyros and souvlaki in a chaotic, fun counter-service setup.",
                link: "https://www.papercitymag.com/restaurants/houston-legacy-restaurant-classic-instituions-niko-nikos-molinas-kenny-ziggy/"
            },
            {
                name: "Kenny & Ziggy's",
                category: "Historic Lunch",
                icon: "🥪",
                color: "bg-yellow-100 text-yellow-800",
                gist: "An Uptown culinary anomaly—a massive, authentic, third-generation NY Jewish deli in Texas serving mammoth, highly-photographable sandwiches.",
                link: "https://www.papercitymag.com/restaurants/houston-legacy-restaurant-classic-instituions-niko-nikos-molinas-kenny-ziggy/"
            },
            {
                name: "China Garden",
                category: "Historic Lunch",
                icon: "🥪",
                color: "bg-yellow-100 text-yellow-800",
                gist: "Houston's oldest Chinese restaurant (1969). A pristine, untouched mid-century time capsule serving classic Chinese-American comfort fare.",
                link: "https://www.papercitymag.com/restaurants/houston-legacy-restaurant-classic-instituions-niko-nikos-molinas-kenny-ziggy/"
            },
            {
                name: "Neon Boots Dancehall",
                category: "Country",
                icon: "🤠",
                color: "bg-blue-100 text-blue-800",
                gist: "Massive 11,000 sq ft historic honky-tonk (where Willie Nelson played). Now an aggressively inclusive, LGBTQ+ friendly space offering free two-step lessons.",
                link: "https://neonbootsclub.com/"
            },
            {
                name: "Shady Acres Saloon",
                category: "Country",
                icon: "🤠",
                color: "bg-blue-100 text-blue-800",
                gist: "Brings remote Hill Country vibes directly into the urban loop. Features a sprawling outdoor dirt patio, cold beer, and a laid-back Americana feel.",
                link: "https://shadyacressaloon.com/"
            }
        ];

        const categories = ["All", "Bars", "BBQ", "Tex-Mex", "Historic Lunch", "Country"];
        let activeCategory = "All";

        const filterContainer = document.getElementById('filter-container');
        const venueList = document.getElementById('venue-list');

        function renderFilters() {
            filterContainer.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                const isActive = cat === activeCategory;
                btn.className = `whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-colors border ${isActive ? 'bg-gray-900 text-white border-gray-900 shadow-md' : 'bg-white text-gray-600 border-gray-200 active:bg-gray-100'}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    activeCategory = cat;
                    renderFilters();
                    renderVenues();
                };
                filterContainer.appendChild(btn);
            });
        }

        function renderVenues() {
            venueList.innerHTML = '';
            const filtered = activeCategory === "All" ? venues : venues.filter(v => v.category === activeCategory);
            
            filtered.forEach(venue => {
                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-gray-100 mb-4 overflow-hidden transform transition-all";
                
                card.innerHTML = `
                    <div class="p-5">
                        <div class="flex justify-between items-start mb-3">
                            <h2 class="text-xl font-bold text-gray-900 leading-tight">${venue.name}</h2>
                            <span class="text-xs font-bold px-2.5 py-1 rounded-full ${venue.color} flex items-center gap-1 shrink-0 ml-3">
                                ${venue.icon} ${venue.category}
                            </span>
                        </div>
                        <p class="text-gray-600 text-sm leading-relaxed mb-5">
                            ${venue.gist}
                        </p>
                        <a href="${venue.link}" target="_blank" rel="noopener noreferrer" class="block w-full text-center bg-gray-50 hover:bg-gray-100 active:bg-gray-200 text-gray-900 border border-gray-200 font-bold py-3.5 rounded-xl transition-colors">
                            Visit Website
                        </a>
                    </div>
                `;
                venueList.appendChild(card);
            });
        }

        // Initialize
        renderFilters();
        renderVenues();
    </script>
</body>
</html>
