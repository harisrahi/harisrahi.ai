<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Norwegian 4×4</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--ac:#FF5722;--gl:rgba(255,87,34,.3)}
html{height:100%}
body{
  height:100vh;
  background:#0c0c0c;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  display:flex;flex-direction:column;align-items:center;
  padding:20px 20px 24px;
  padding-top:max(20px,env(safe-area-inset-top));
  padding-bottom:max(24px,env(safe-area-inset-bottom));
  overflow:hidden;user-select:none;touch-action:manipulation;
}
.hdr{width:100%;display:flex;flex-direction:column;align-items:center;gap:14px;flex-shrink:0}
.brand{font-size:11px;letter-spacing:6px;text-transform:uppercase;color:#333;font-weight:500}
.i-track{display:flex;gap:10px}
.i-pip{
  width:50px;height:7px;border-radius:4px;background:#1e1e1e;
  transition:background .4s,box-shadow .4s
}
.i-pip.done{background:var(--ac)}
.i-pip.act{background:var(--ac);box-shadow:0 0 10px var(--gl)}

.main{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 0}
.phase-lbl{font-size:12px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:var(--ac);transition:color .5s;margin-bottom:4px;text-align:center}
.move-lbl{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#444;margin-bottom:18px;text-align:center;min-height:14px}

.ring-wrap{position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ring-svg{display:block;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:#1a1a1a;stroke-width:11}
.ring-fg{fill:none;stroke:var(--ac);stroke-width:11;stroke-linecap:round;transition:stroke-dashoffset .92s linear,stroke .5s ease}
.ring-inner{position:absolute;display:flex;flex-direction:column;align-items:center;gap:4px;pointer-events:none}
.t-big{font-size:80px;font-weight:100;letter-spacing:-5px;line-height:.9;font-variant-numeric:tabular-nums}
.t-lbl{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#333}

.m-track{display:flex;gap:14px;margin-top:22px}
.m-pip{width:13px;height:13px;border-radius:50%;background:#1a1a1a;border:1.5px solid #2a2a2a;transition:all .3s}
.m-pip.done{background:var(--ac);border-color:var(--ac)}
.m-pip.act{background:var(--ac);border-color:var(--ac);box-shadow:0 0 12px var(--gl);animation:mp 1.2s ease-in-out infinite}
@keyframes mp{50%{transform:scale(1.5)}}

.hint{font-size:13px;color:#3a3a3a;margin-top:16px;text-align:center;min-height:18px}

.done-wrap{flex:1;width:100%;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px}
.done-wrap.vis{display:flex}
.done-ico{font-size:76px}
.done-h{font-size:40px;font-weight:800;letter-spacing:6px;color:#FFD700}
.done-sub{font-size:14px;color:#555}

.ftr{width:100%;display:flex;flex-direction:column;gap:10px;flex-shrink:0}
.btn-go{
  width:100%;padding:20px;border:none;border-radius:18px;
  font-size:20px;font-weight:800;letter-spacing:4px;text-transform:uppercase;
  color:#fff;background:var(--ac);cursor:pointer;
  transition:background .5s,box-shadow .5s,transform .1s;
  box-shadow:0 6px 26px var(--gl)
}
.btn-go:active{transform:scale(.965)}
.btn-rst{
  width:100%;padding:13px;border:1.5px solid #222;border-radius:13px;
  font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;
  color:#3a3a3a;background:transparent;cursor:pointer;transition:border-color .2s,color .2s
}
.btn-rst:active{border-color:#444;color:#666}
</style>
</head>
<body>

<div class="hdr">
  <div class="brand">Norwegian 4 × 4</div>
  <div class="i-track" id="iTrack">
    <div class="i-pip" data-n="1"></div>
    <div class="i-pip" data-n="2"></div>
    <div class="i-pip" data-n="3"></div>
    <div class="i-pip" data-n="4"></div>
  </div>
</div>

<div class="main" id="mainWrap">
  <div class="phase-lbl" id="phaseLbl">INTERVAL</div>
  <div class="move-lbl" id="moveLbl">MOVE 1 OF 4</div>
  <div class="ring-wrap">
    <svg class="ring-svg" width="260" height="260" viewBox="0 0 260 260">
      <circle class="ring-bg" cx="130" cy="130" r="112"/>
      <circle class="ring-fg" id="ringFg" cx="130" cy="130" r="112"
        stroke-dasharray="703.7" stroke-dashoffset="0"/>
    </svg>
    <div class="ring-inner">
      <div class="t-big" id="tBig">1:00</div>
      <div class="t-lbl" id="tLbl">per move</div>
    </div>
  </div>
  <div class="m-track" id="mTrack">
    <div class="m-pip" data-m="1"></div>
    <div class="m-pip" data-m="2"></div>
    <div class="m-pip" data-m="3"></div>
    <div class="m-pip" data-m="4"></div>
  </div>
  <div class="hint" id="hint">Tap START when ready</div>
</div>

<div class="done-wrap" id="doneWrap">
  <div class="done-ico">🔥</div>
  <div class="done-h">DONE!</div>
  <div class="done-sub">Norwegian 4×4 complete. Great effort.</div>
</div>

<div class="ftr">
  <button class="btn-go" id="btnGo" onclick="onGo()">START</button>
  <button class="btn-rst" onclick="onReset()">RESET</button>
</div>

<script>
// ── AUDIO ──────────────────────────────────────────
let ACX=null,COMP=null;

function aud(){
  if(!ACX){
    ACX=new(window.AudioContext||window.webkitAudioContext)();
    COMP=ACX.createDynamicsCompressor();
    COMP.threshold.value=-4;COMP.knee.value=2;
    COMP.ratio.value=16;COMP.attack.value=0.001;COMP.release.value=0.1;
    COMP.connect(ACX.destination);
  }
  if(ACX.state==='suspended')ACX.resume();
  return ACX;
}

function mkO(freq,type,t0,dur,vol){
  const c=aud(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(COMP);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,t0);
  g.gain.linearRampToValueAtTime(vol,t0+.007);
  g.gain.exponentialRampToValueAtTime(.001,t0+dur);
  o.start(t0);o.stop(t0+dur+.01);
}

// Sharp double-hit beep — move change
function sndMove(){
  const t=aud().currentTime;
  mkO(880,'square',t,.14,.95);
  mkO(1100,'square',t+.15,.13,.9);
}

// Fanfare + deep gong — interval end
function sndEnd(){
  const c=aud(),t=c.currentTime;
  [392,523,659,784].forEach((f,i)=>mkO(f,'triangle',t+i*.1,.3,.8));
  const o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(COMP);o.type='sine';
  const gt=t+.52;
  o.frequency.setValueAtTime(210,gt);
  o.frequency.exponentialRampToValueAtTime(60,gt+2.4);
  g.gain.setValueAtTime(0,gt);g.gain.linearRampToValueAtTime(.95,gt+.01);
  g.gain.exponentialRampToValueAtTime(.001,gt+3.0);
  o.start(gt);o.stop(gt+3.01);
}

// Short ascending chirp — start / rest-end
function sndGo(){
  const t=aud().currentTime;
  mkO(660,'sine',t,.18,.7);
  mkO(880,'sine',t+.1,.18,.7);
}

// ── STATE ──────────────────────────────────────────
const NI=4,NM=4,WS=60,RS=180;
const CIRC=2*Math.PI*112; // 703.7

let phase='idle',ci=1,cm=1,wsec=WS,rsec=RS;
let going=false,ticker=null;

// ── HELPERS ────────────────────────────────────────
const $=id=>document.getElementById(id);
const fmt=s=>`${~~(s/60)}:${String(s%60).padStart(2,'0')}`;

const WC='#FF5722',WG='rgba(255,87,34,.3)';
const RC='#00BCD4',RG='rgba(0,188,212,.3)';
const DC='#FFD700',DG='rgba(255,215,0,.3)';

function accent(c,g){
  document.documentElement.style.setProperty('--ac',c);
  document.documentElement.style.setProperty('--gl',g);
}

function ring(s,tot){
  $('ringFg').style.strokeDashoffset=CIRC*(1-Math.max(0,s/tot));
}

function dots(){
  $('iTrack').querySelectorAll('.i-pip').forEach(d=>{
    const n=+d.dataset.n;
    if(phase==='done'){d.className='i-pip done';return;}
    d.className='i-pip'+(n<ci?' done':n===ci?' act':'');
  });
  $('mTrack').querySelectorAll('.m-pip').forEach(d=>{
    const m=+d.dataset.m;
    if(phase==='rest'||phase==='done'){d.className='m-pip done';return;}
    d.className='m-pip'+(m<cm?' done':m===cm?' act':'');
  });
}

// ── RENDER ─────────────────────────────────────────
function render(){
  if(phase==='idle'){
    accent(WC,WG);
    $('phaseLbl').textContent='INTERVAL 1 OF 4';
    $('moveLbl').textContent='MOVE 1 OF 4';
    $('tBig').textContent='1:00';$('tLbl').textContent='per move';
    $('hint').textContent='Tap START when ready';
    ring(WS,WS);$('btnGo').textContent='START';

  }else if(phase==='work'){
    accent(WC,WG);
    $('phaseLbl').textContent=`INTERVAL ${ci} OF ${NI}`;
    $('moveLbl').textContent=`MOVE ${cm} OF ${NM}`;
    $('tBig').textContent=fmt(wsec);$('tLbl').textContent='left';
    $('hint').textContent='';
    ring(wsec,WS);$('btnGo').textContent=going?'PAUSE':'RESUME';

  }else if(phase==='rest'){
    accent(RC,RG);
    $('phaseLbl').textContent='REST';
    $('moveLbl').textContent=`UP NEXT: INTERVAL ${ci} OF ${NI}`;
    $('tBig').textContent=fmt(rsec);$('tLbl').textContent='recover';
    $('hint').textContent='Breathe. Next interval coming.';
    ring(rsec,RS);$('btnGo').textContent=going?'PAUSE':'RESUME';

  }else if(phase==='done'){
    accent(DC,DG);
    $('mainWrap').style.display='none';
    $('doneWrap').classList.add('vis');
    $('btnGo').style.display='none';
  }
  dots();
}

// ── TICK ───────────────────────────────────────────
function tick(){
  if(phase==='work'){
    wsec--;
    if(wsec<=0){
      if(cm===NM){
        if(ci===NI){sndEnd();phase='done';stop();render();return;}
        sndEnd();ci++;cm=1;wsec=WS;rsec=RS;phase='rest';
      }else{
        sndMove();cm++;wsec=WS;
      }
    }
  }else if(phase==='rest'){
    rsec--;
    if(rsec<=0){sndGo();phase='work';wsec=WS;cm=1;}
  }
  render();
}

function stop(){
  if(ticker){clearInterval(ticker);ticker=null;}
  going=false;
}

// ── CONTROLS ───────────────────────────────────────
function onGo(){
  aud();
  if(phase==='idle'){
    phase='work';wsec=WS;ci=1;cm=1;
    sndGo();going=true;
    ticker=setInterval(tick,1000);
    render();return;
  }
  if(going){stop();$('btnGo').textContent='RESUME';}
  else{going=true;ticker=setInterval(tick,1000);$('btnGo').textContent='PAUSE';}
}

function onReset(){
  stop();phase='idle';ci=1;cm=1;wsec=WS;rsec=RS;
  $('mainWrap').style.display='';
  $('doneWrap').classList.remove('vis');
  $('btnGo').style.display='';
  render();
}

// Wake lock — keeps screen on during workout
(async()=>{try{if('wakeLock'in navigator)await navigator.wakeLock.request('screen');}catch(e){}})();

render();
</script>
</body>
</html>
